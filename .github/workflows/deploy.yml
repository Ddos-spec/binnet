name: Build and Trigger cPanel Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Push dist to deploy branch
        run: |
          git config user.email "setgraph69@gmail.com"
          git config user.name "Ddos-spec"
          
          # Create orphan branch with only dist contents
          git checkout --orphan cpanel-deploy
          git rm -rf --cached . || true
          
          # Copy dist contents to root
          cp -r dist/. .
          rm -rf dist node_modules src public .github astro.config.* package*.json tsconfig.json .cpanel.yml
          
          # Copy .cpanel.yml for deployment tasks
          cat > .cpanel.yml << 'EOF'
          ---
          deployment:
            tasks:
              - export DEPLOYPATH=/home/binnetbi/public_html
              - /bin/rsync -av --delete $CPANEL_SOURCE_DIR/ $DEPLOYPATH/
          EOF
          
          git add -A
          git commit -m "deploy: build from $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push -f origin cpanel-deploy

      - name: Trigger cPanel Git Deploy via API
        env:
          CPANEL_HOST: crazybolt.hosterserver.com
          CPANEL_PORT: 2083
          CPANEL_USER: binnetbi
          CPANEL_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          curl -sk "https://$CPANEL_HOST:$CPANEL_PORT/execute/VersionControlDeployment/create" \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            -d "repository=/home/binnetbi/repos/binnet" \
            | python3 -m json.tool || echo "Deploy trigger sent"
