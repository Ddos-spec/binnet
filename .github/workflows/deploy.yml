name: Deploy to Hoster.co.id via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/github_deploy
          chmod 600 ~/.ssh/github_deploy

      - name: Deploy via rsync over SSH
        env:
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          sshpass -P passphrase -p "$SSH_PASSPHRASE" rsync -avz --delete \
            -e "ssh -i ~/.ssh/github_deploy -p 22 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            dist/ \
            "$SSH_USER@$SSH_HOST:/home/binnetbi/public_html/"
